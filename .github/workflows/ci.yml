name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          # --no-deps keeps the heavy optional stack (tensorflow, transformers,
          # celery, redis) out of CI; install only what the test suite imports.
          pip install fastapi httpx structlog sqlalchemy python-dotenv prometheus-client "python-jose[cryptography]"
          pip install pytest pytest-asyncio ruff
      - name: Lint
        run: |
          ruff check . --exit-zero
      - name: Test
        run: |
          pytest -q
